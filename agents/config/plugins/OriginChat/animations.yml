# OriginChat Animations Configuration
# Unlocalized format:
# animation_name:
#   interval: interval_in_ticks (20 ticks = 1 second)
#   frames:
#     - frame1
#     - frame2
#     - etc.
#
# Localized format:
# animation_name:
#   interval: interval_in_ticks (20 ticks = 1 second)
#   frames:
#     ru_ru: # language code
#       - frame1 in Russian
#       - frame2 in Russian
#     en_us: # language code
#       - frame1 in English
#       - frame2 in English

# Example of a rainbow animation
rainbow:
  interval: 5
  frames:
  - '&fР&fа&fд&fу&fг&fа'
  - '&fР&fа&fд&fу&fг&fа'
  - '&fР&fа&fд&fу&fг&fа'
  - '&fР&fа&fд&fу&fг&fа'
  - '&fР&fа&fд&fу&fг&fа'
  - '&fР&fа&fд&fу&fг&fа'

