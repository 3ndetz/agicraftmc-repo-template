# Configuration for the Book Formatting module

# Enable/disable the module
enabled: false

# Allow the use of Markdown syntax in books
# Supported formats:
# **text** - bold text
# *text* - italic text
# ~~text~~ - strikethrough text
# __text__ - underlined text
allow_markdown: true

# Allow the use of color codes with the & symbol
# Example: &fRed text, &fAqua text
allow_color_codes: true

# Require permission to use formatting
require_permission: true

# Permission to use formatting in books
permission: originchat.bookformatting.use
