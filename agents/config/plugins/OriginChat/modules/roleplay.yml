# Roleplay commands module configuration

# Command action distances (in blocks)
command_ranges:
  me: 100
  do: 100
  try: 100
  todo: 100
  roll: 100
  ball: 100
  # Global commands have no distance limit (-1 for global)
  gme: -1
  gdo: -1
  gtry: -1
  gtodo: -1
  groll: -1
  gball: -1

# Enable/disable global commands
global_commands_enabled: false

# Enable/disable roleplay module features
enabled: false

