# Server messages module configuration

# Enable/disable player join messages
join_message_enabled: true

# Enable/disable player leave messages
leave_message_enabled: true

# Fallback templates used when localized messages are missing.
# You can leave this list empty to disable fallback text.
join_messages:
- '&f+ &f{player} :)'

leave_messages:
- '&f- &f{player} :('

# Enable/disable personal welcome messages
personal_welcome:
  enabled: false
  title:
    enabled: true
    text: '{animation_welcome_subtitle}'
    fade_in: 10
    stay: 70
    fade_out: 20
  subtitle:
    enabled: true
    text: ''
    fade_in: 10
    stay: 70
    fade_out: 20
  text:
    enabled: false
    message: ''

# Enable/disable operator messages
op_message_enabled: false

# Disable vanilla operator messages
disable_vanilla_op_messages: false

# Enable/disable gamemode change messages
gamemode_message_enabled: false

# Disable vanilla gamemode messages
disable_vanilla_gamemode_messages: false

# Enable/disable seed command messages
seed_message_enabled: false

# Disable vanilla seed messages
disable_vanilla_seed_messages: true
